<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchlist – Movie Night Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="10" width="32" height="22" rx="3" fill="var(--accent)"/>
          <rect x="4" y="10" width="32" height="6" rx="2" fill="var(--navy-light)"/>
          <line x1="10" y1="10" x2="10" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <line x1="18" y1="10" x2="18" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <line x1="26" y1="10" x2="26" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="20" cy="25" r="5" fill="var(--bg)"/>
          <polygon points="18,22 18,28 24,25" fill="var(--accent)"/>
        </svg>
        <span>Movie Night Picker</span>
      </a>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Search</a>
        <a href="watchlist.html" class="nav-link active">
          Watchlist
          <span class="watchlist-count" id="nav-watchlist-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1 class="page-title">Your Watchlist</h1>
      <div class="watchlist-controls" id="watchlist-controls">
        <select class="sort-select" id="watchlist-sort">
          <option value="added">Sort: Recently Added</option>
          <option value="rating">Sort: Rating</option>
          <option value="title">Sort: Title</option>
        </select>
        <button class="btn-pick" id="watchlist-pick-btn">🎲 Pick from Watchlist</button>
      </div>
    </div>

    <div class="results-grid" id="watchlist-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="empty-state" id="watchlist-empty" hidden>
      <p>Your watchlist is empty.</p>
      <a href="index.html" class="btn-secondary">Find movies to watch</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="src/js/watchlist-page.js"></script>
</body>
</html>
