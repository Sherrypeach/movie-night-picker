<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Detail – Movie Night Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="10" width="32" height="22" rx="3" fill="var(--accent)"/>
          <rect x="4" y="10" width="32" height="6" rx="2" fill="var(--navy-light)"/>
          <line x1="10" y1="10" x2="10" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <line x1="18" y1="10" x2="18" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <line x1="26" y1="10" x2="26" y2="16" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="20" cy="25" r="5" fill="var(--bg)"/>
          <polygon points="18,22 18,28 24,25" fill="var(--accent)"/>
        </svg>
        <span>Movie Night Picker</span>
      </a>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Search</a>
        <a href="watchlist.html" class="nav-link">
          Watchlist
          <span class="watchlist-count" id="nav-watchlist-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <a href="index.html" class="back-link">← Back to Search</a>

    <div class="detail-loading" id="detail-loading">
      <div class="spinner"></div>
    </div>

    <article class="detail-wrap" id="detail-wrap" hidden>
      <div class="detail-backdrop" id="detail-backdrop"></div>

      <div class="detail-content">
        <div class="detail-poster-col">
          <img id="detail-poster" class="detail-poster" src="" alt="" />
          <button class="btn-watchlist" id="detail-watchlist-btn">+ Add to Watchlist</button>
        </div>

        <div class="detail-info-col">
          <div class="detail-meta">
            <span class="detail-year" id="detail-year"></span>
            <span class="detail-runtime" id="detail-runtime"></span>
            <span class="rating-badge" id="detail-rating"></span>
          </div>

          <h1 class="detail-title" id="detail-title"></h1>

          <div class="detail-genres" id="detail-genres"></div>

          <p class="detail-overview" id="detail-overview"></p>

          <div class="detail-cast">
            <h3>Cast</h3>
            <div class="cast-list" id="cast-list"></div>
          </div>
        </div>
      </div>

      <div class="trailer-section" id="trailer-section" hidden>
        <h2 class="trailer-heading">Trailer</h2>
        <div class="trailer-wrap">
          <iframe
            id="trailer-iframe"
            src=""
            title="Movie Trailer"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </article>
  </main>

  <script type="module" src="src/js/detail.js"></script>
</body>
</html>
